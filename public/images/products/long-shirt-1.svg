<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="ls1-bg" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="50%" stop-color="#EDE5D8"/>
      <stop offset="100%" stop-color="#E2D9CA"/>
    </linearGradient>
    <linearGradient id="ls1-overlay" x1="0%" y1="65%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2C3E36" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2C3E36" stop-opacity="0.55"/>
    </linearGradient>
    <!-- Burlap / woven texture pattern -->
    <pattern id="ls1-weave" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="4" x2="8" y2="4" stroke="#C8B89A" stroke-width="0.3" opacity="0.25"/>
      <line x1="4" y1="0" x2="4" y2="8" stroke="#C8B89A" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- Cream hemp fabric background -->
  <rect width="600" height="800" fill="url(#ls1-bg)"/>
  <rect width="600" height="800" fill="url(#ls1-weave)"/>
  <!-- Garment silhouette (sleeveless long shirt) -->
  <path d="M200 180 L190 160 L170 150 L160 155 L175 170 L175 620 L220 640 L300 650 L380 640 L425 620 L425 170 L440 155 L430 150 L410 160 L400 180 L370 170 L300 165 L230 170 Z" fill="#FAF5ED" opacity="0.6" stroke="#C8B89A" stroke-width="1"/>
  <!-- Red spiral embroidery cluster (bottom-left of garment) -->
  <g transform="translate(230,530)">
    <!-- Large spiral -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#B22234" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#B22234" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#B22234" stroke-width="1.5" opacity="0.55"/>
    <circle cx="0" cy="0" r="8" fill="#B22234" opacity="0.5"/>
    <!-- Medium spiral -->
    <circle cx="45" cy="-20" r="22" fill="none" stroke="#B22234" stroke-width="1.5" opacity="0.6"/>
    <circle cx="45" cy="-20" r="14" fill="none" stroke="#B22234" stroke-width="1.2" opacity="0.5"/>
    <circle cx="45" cy="-20" r="6" fill="#B22234" opacity="0.45"/>
    <!-- Small spiral -->
    <circle cx="30" cy="30" r="16" fill="none" stroke="#B22234" stroke-width="1.2" opacity="0.55"/>
    <circle cx="30" cy="30" r="9" fill="none" stroke="#B22234" stroke-width="1" opacity="0.45"/>
    <circle cx="30" cy="30" r="4" fill="#B22234" opacity="0.4"/>
    <!-- Tiny accent -->
    <circle cx="60" cy="12" r="10" fill="none" stroke="#B22234" stroke-width="1" opacity="0.45"/>
    <circle cx="60" cy="12" r="4" fill="#B22234" opacity="0.35"/>
  </g>
  <!-- Subtle leaf decorations in corners -->
  <g transform="translate(80,120) rotate(-15) scale(0.8)" opacity="0.06">
    <path d="M0-60C-30-40,-40 0,-20 30C-10 50,0 60,0 60S10 50,20 30C40 0,30-40,0-60Z" fill="#3D6B5A"/>
  </g>
  <g transform="translate(520,680) rotate(20) scale(0.7)" opacity="0.06">
    <path d="M0-60C-30-40,-40 0,-20 30C-10 50,0 60,0 60S10 50,20 30C40 0,30-40,0-60Z" fill="#3D6B5A"/>
  </g>
  <!-- Color palette dots (matching the image style) -->
  <circle cx="50" cy="60" r="12" fill="#8B1A2B"/>
  <circle cx="80" cy="60" r="12" fill="#D4C5A9"/>
  <circle cx="110" cy="60" r="12" fill="#B22234"/>
  <circle cx="140" cy="60" r="12" fill="#B8AFA3"/>
  <!-- Overlay + labels -->
  <rect width="600" height="800" fill="url(#ls1-overlay)"/>
  <text x="300" y="720" text-anchor="middle" font-family="Georgia,serif" font-size="26" fill="#FAF5ED" font-weight="600">Hand Embroidered Hemp Long Shirt</text>
  <text x="300" y="752" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#D4C5A9">Pure Hemp · Hand Embroidered · Pockets</text>
</svg>